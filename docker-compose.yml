version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: hybrid-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - EMBEDDING_PROVIDER=local
      - APP_API_KEY=dev-secret-key
      # For OpenAI embeddings:
      # - EMBEDDING_PROVIDER=openai
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - OPENAI_EMBEDDING_MODEL=text-embedding-3-small
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: hybrid-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:4000
      - VITE_API_KEY=dev-secret-key
    depends_on:
      - backend
